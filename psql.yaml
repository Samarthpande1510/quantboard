services:
  db:
    image: postgres:16

    ports:
    - "5432:5432"

    environment:
      POSTGRES_USER: samarthpande1510
      POSTGRES_DB: quantboard
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samarthpande1510 -d quantboard"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend

    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data: